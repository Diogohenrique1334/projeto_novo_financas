# Tema dark FIXO (preferência do Diogo) — não depende do toggle do usuário.
# O bloco [auth] (OIDC Google) entra aqui na Fase 3.
[theme]
base = "dark"
primaryColor = "#10b981"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#161b22"
textColor = "#e6edf3"

[server]
maxUploadSize = 10

[browser]
gatherUsageStats = false
